_base_: default.yaml

algorithm: ActorCritic

# 训练控制（step-based）
total_steps: 100000
log_interval: 1000
eval_interval: 5000
save_interval: 10000

# 超参
lr: 3e-4
gamma: 0.99
entropy_coef: 0.01
vf_coef: 0.5
n_steps: 5
gae_lambda: 0.95
normalize_advantage: false

# 网络
hidden_dims: [128, 128]

evaluation:
  total_episodes: 10
  deterministic: false

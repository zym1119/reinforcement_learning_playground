_base_: default.yaml

algorithm: SAC

# 训练控制（step-based）
total_steps: 1000000
log_interval: 1000
eval_interval: 5000
save_interval: 50000

# 超参
lr: 3e-4
gamma: 0.99
alpha: 0.2
tau: 0.005
batch_size: 256
buffer_size: 1000000
policy_delay: 1

# 网络
hidden_dims: [256, 256]

evaluation:
  total_episodes: 10
  deterministic: true

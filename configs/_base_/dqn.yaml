_base_: default.yaml

algorithm: DQN

# 训练控制（step-based）
total_steps: 100000
log_interval: 1000
eval_interval: 5000
save_interval: 20000

# 超参
lr: 1e-3
gamma: 0.99
epsilon_start: 1.0
epsilon_end: 0.01
epsilon_decay_steps: 30000
batch_size: 64
buffer_size: 50000
target_update_freq: 500

# 网络
hidden_dims: [128, 128]

evaluation:
  total_episodes: 10

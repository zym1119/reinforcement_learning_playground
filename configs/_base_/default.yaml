# 全局默认配置，所有算法的 base config 都应继承此文件

env: CartPole-v1
env_kwargs: {}
seed: 42
device: auto
work_dir: ./work_dirs
run_name: null

# 训练控制
# 二选一：total_steps (step-based) 或 total_episodes (episode-based)
total_steps: 100000
log_interval: 20        # 每 N 个 episode/step 打印日志
eval_interval: 10000       # 每 N 个 episode/step 评估
save_interval: 10000      # 每 N 个 episode/step 保存 checkpoint

# 通用超参
lr: 3e-4
gamma: 0.99

# 学习率调度器（默认不启用，各算法 base config 按需配置）
# lr_scheduler:
#   type: StepLR          # StepLR / ExponentialLR / CosineAnnealingLR
#   step_size: 200        # 每 N 个 episode/update 衰减一次
#   gamma: 0.9            # 衰减因子

# 网络结构
hidden_dims: [64, 64]
activation: relu

# 推理/评估配置
evaluation:
  total_episodes: 10      # 二选一：total_episodes 或 total_steps
  # total_steps: 1000
  render_mode: rgb_array  # human / rgb_array
  dump_video: true        # 是否录制视频
  video_fps: 30
